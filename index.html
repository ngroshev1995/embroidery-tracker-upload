<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Загрузка фото в Трекер</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #f8fafc; padding: 20px; color: #334155; margin: 0; }
        .card { background: white; padding: 30px 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); max-width: 360px; margin: 40px auto; border: 1px solid #e2e8f0; }
        h2 { color: #3b82f6; margin-top: 0; font-size: 20px; }
        p { font-size: 14px; color: #64748b; line-height: 1.5; }
        input[type="file"] { display: none; }
        .btn-choose { display: inline-block; background: #3b82f6; color: white; padding: 14px 24px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px; font-size: 15px; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2); }
        .btn-submit { background: #10b981; color: white; border: none; padding: 14px 24px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; display: none; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); }
        #filename { margin-bottom: 20px; font-weight: 600; color: #1e293b; font-size: 13px; word-break: break-all; }
        .status { margin-top: 20px; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📷 Отправить фото процесса</h2>
        <p>Сделайте снимок вышивки, чтобы мгновенно передать его в программу на компьютере.</p>
        
        <label for="file" class="btn-choose">📸 Сделать фото / Выбрать файл</label>
        <input type="file" id="file" accept="image/*" onchange="fileSelected(this)">
        <div id="filename"></div>
        <button id="submit" class="btn-submit" onclick="uploadPhoto()">🚀 Отправить в Трекер</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        // Глобальный перехватчик ошибок для вывода на экран телефона
        window.onerror = function(message, source, lineno, colno, error) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "❌ Ошибка скрипта: " + message;
            statusDiv.style.color = "#ef4444";
            document.getElementById('submit').disabled = false;
            return false;
        };

        // ── КОНФИГУРАЦИЯ SUPABASE ───────────────────────────────────────────
        const SUPABASE_URL = "https://xlgctttisnjywnhlmimx.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJ6dXBHYmFzZSiSiInJlZiI6InhsZ2N0dHRpc25qeXduaGxtaW14IiwiYm9sZSI6ImFub24iLCJpYQiojE3ODQxMDg0NjEsImV4cCI6M_v4cCI6MjA5OTY4NDQ2MX0.KfnFGrdGWkbyPdODQuIFXv8eacYXjsUwNSv4gKMY48M"; 
        const BUCKET_NAME = "temp_photos";

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');

        function fileSelected(input) {
            if (input.files && input.files[0]) {
                document.getElementById('filename').innerText = "Выбран файл: " + input.files[0].name;
                document.getElementById('submit').style.display = 'block';
                document.getElementById('status').innerText = "";
            }
        }

        // Высокоэффективная функция сжатия без утечек памяти (через ObjectURL)
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        URL.revokeObjectURL(img.src); // Очищаем память
                        resolve(blob);
                    }, 'image/jpeg', quality);
                };
                img.onerror = (err) => {
                    URL.revokeObjectURL(img.src);
                    reject(err);
                };
            });
        }

        // Кроссплатформенный конвертер файла в ArrayBuffer (совместим со старыми телефонами)
        function fileToArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(reader.error);
                reader.readAsArrayBuffer(file);
            });
        }

        async function uploadPhoto() {
            if (!sessionId) {
                alert("Ошибка: Отсутствует код сессии!");
                return;
            }

            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            if (!file) return;

            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "⏳ Оптимизация снимка...";
            statusDiv.style.color = "#3b82f6";
            document.getElementById('submit').disabled = true;

            const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${sessionId}.jpg`;

            try {
                // Сжимаем фото до 1200px с качеством 0.75
                const compressedBlob = await compressImage(file, 1200, 1200, 0.75);

                statusDiv.innerText = "⏳ Отправка в облако...";
                const arrayBuffer = await fileToArrayBuffer(compressedBlob);

                const response = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'image/jpeg'
                    },
                    body: arrayBuffer
                });

                if (response.ok) {
                    statusDiv.innerText = "✅ Успешно отправлено!";
                    statusDiv.style.color = "#10b981";
                    document.getElementById('submit').style.display = 'none';
                    document.getElementById('filename').innerText = "";
                } else {
                    const errData = await response.json();
                    statusDiv.innerText = "❌ Ошибка: " + (errData.message || "Не удалось отправить");
                    statusDiv.style.color = "#ef4444";
                    document.getElementById('submit').disabled = false;
                }
            } catch (err) {
                statusDiv.innerText = "❌ Сбой: " + err.message;
                statusDiv.style.color = "#ef4444";
                document.getElementById('submit').disabled = false;
            }
        }
    </script>
</body>
</html>
